<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="contacto.css">
</head>

<body>

    <header>


        <div class="logo">

            <span class="logo"><img src="/images/AZUL.svg" alt=""></span>

        </div>

        <input type="checkbox" id="toggle__menu">
        <label for="toggle__menu">
            <img class="menu_icon" src="/images/bars-solid-full.svg" alt="">
        </label>

        <nav class="menu">

            <ul class="menu_list">
                <li><a href="/index.html" class="menu_item">Menú</a></li>
                <li><a href="/galeria.html" class="menu_item">Galeria</a></li>
                <li><a href="contacto.html" class="menu_item">Contacto</a></li>
            </ul>

        </nav>


    </header>

    <main>

        <form class="white">



            <h1>Recibe más información</h1>



            <fieldset>
                <legend>Datos personales</legend>

                <label class="white" for="name">Nombre:
                    <input class="white" placeholder="Nombre" id="name">
                </label>

                <label class="white" for="lastname">Apellido:
                    <input type="text" placeholder="Apellido" id="lastname">
                </label>

                <label class="white" for="birth_date">Fecha de nacimiento
                    <input class="white" type="date" placeholder="" id="birth_date">
                </label>


                <label class="white" for="adress">Dirección
                    <input class="white" type="text" placeholder="Calle 1 #1-1" id="adress">
                </label>

            </fieldset>
            <fieldset>
                <legend>Registro</legend>

                <label class="white" for="email">Correo:
                    <input class="white" type="email" placeholder="Correo" id="email">
                </label>

                <label class="white" for="password">Contraseña:
                    <input class="white" type="password" placeholder="******" id="password">
                </label>

                <label class="white" for="password_2">Confirme Su Contraseña:
                    <input class="white" type="password" placeholder="******" id="password_2">
                </label>
                <label for="">Ocupación
                    <select name="" id="">
                        <option value="">Estudiante</option>
                        <option value="">Trabajador</option>
                        <option value="">Jubilado</option>

                    </select>


                </label>
            </fieldset>




        </form>




    </main>

    <footer>
        <p>Amed Vanegas 2026®</p>
    </footer>

</body>

</html>
